<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TimeBlock</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Noto+Sans+KR:wght@200;300;400&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0e0e0e; --accent: #c8e040; }
html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  font-family: 'Noto Sans KR', sans-serif;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
#setupView, #runView {
  position: fixed; inset: 0;
  transition: opacity .35s ease;
}
#setupView { z-index: 10; background: var(--bg); display: flex; flex-direction: column; }
#runView { z-index: 5; opacity: 0; pointer-events: none; background: #090909; }
#runView.active { opacity: 1; pointer-events: all; z-index: 15; }
#setupView.hidden { opacity: 0; pointer-events: none; }

/* header */
.sv-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 20px 10px; flex-shrink: 0;
}
.sv-logo { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:5px; color:#3a3a3a; }
.sv-remain-wrap {
  display: flex; flex-direction: column; align-items: flex-end;
  min-width: 64px;
}
.sv-remain-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px; color: #333; letter-spacing: 2px;
}
.sv-remain-time {
  font-family: 'DM Mono', monospace;
  font-size: 16px; font-weight: 300;
  color: var(--accent);
  letter-spacing: 1px;
  transition: color .3s;
}
.sv-remain-time.over { color: #e05555; }
.sv-total-btn {
  background: none; border: 1px solid rgba(200,224,64,.2);
  border-radius: 8px; padding: 5px 14px;
  color: var(--accent); font-size: 12px;
  font-family:'DM Mono',monospace; cursor: pointer;
}
/* hint */
#hint {
  text-align:center; font-size:10px; color:#2e2e2e;
  letter-spacing:1.5px; padding:0 0 6px;
  font-family:'DM Mono',monospace; flex-shrink:0;
  transition: color .3s;
}
#hint.sel { color: rgba(200,224,64,.4); }

/* treemap preview */
#treemapPreview {
  flex: 1; position: relative;
  margin: 0 14px;
  border-radius: 10px; overflow: hidden;
  background: #141414;
}
.tm-block {
  position: absolute;
  border: 2px solid #0e0e0e;
  cursor: pointer; overflow: hidden;
  transition: background .2s;
  background: #1a1a1a;
}
.tm-block.sel { border-color: var(--accent); background: #222; }
.tm-inner {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:8px; gap:3px;
}
.tm-name {
  font-size:13px; font-weight:300; color:#bbb;
  text-align:center; line-height:1.3;
  max-width:100%; overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap;
}
.tm-name.ph { color:#2e2e2e; font-size:11px; }
.tm-dur {
  font-family:'DM Mono',monospace;
  font-size:11px; color:rgba(200,224,64,.3);
  letter-spacing:1px;
}
.tm-block.sel .tm-dur { color:rgba(200,224,64,.9); }

.tm-block.ordered { border-color: rgba(200,224,64,.5); background: #1e2210; }
.tm-block.ordered .tm-name { color: #ddd; }
.tm-block.ordered .tm-dur  { color: rgba(200,224,64,.7); }
.tm-badge {
  position: absolute; top: 7px; left: 8px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--accent);
  color: #0e0e0e;
  font-size: 11px; font-weight: 400;
  font-family: 'DM Mono', monospace;
  display: flex; align-items: center; justify-content: center;
  z-index: 5; pointer-events: none;
  line-height: 1;
}

/* bottom */
.sv-bottom {
  flex-shrink:0; padding:8px 16px 30px;
  display:flex; flex-direction:column; gap:6px;
}


.add-row { display:flex; align-items:center; justify-content:center; gap:4px; }
.del-btn { background:none; border:none; color:#2a2a2a; font-size:18px; cursor:pointer; padding:0 10px; }
.del-btn:active { color:#666; }
.plus-btn {
  background:none; border:none;
  color:var(--accent); font-size:32px;
  font-family:'DM Mono',monospace; cursor:pointer; padding:0 16px;
}
.block-modal {
  border-radius: 20px 20px 0 0;
  padding-bottom: 0;
}
.block-modal-body {
  padding: 24px 20px 8px;
  display: flex; flex-direction: column; gap: 20px;
}
.block-name-input {
  width: 100%; background: none; border: none; outline: none;
  border-bottom: 1px solid #2a2a2a;
  color: #eee; font-size: 20px; font-weight: 300;
  font-family: 'Noto Sans KR', sans-serif;
  padding-bottom: 8px;
  caret-color: var(--accent);
}
.block-name-input::placeholder { color: #2a2a2a; }
.block-dur-row {
  display: flex; align-items: center; justify-content: space-between;
}
.block-dur-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: #444; letter-spacing: 2px;
}
.block-dur-pickers {
  display: flex; align-items: center; gap: 2px;
}
.block-dur-pickers select {
  background: none; border: none; color: #ddd;
  font-size: 22px; font-weight: 200;
  font-family: 'DM Mono', monospace;
  width: 60px; text-align: center;
  -webkit-appearance: none; cursor: pointer;
}
.block-dur-pickers select option { background: #1a1a1a; }
.block-edit-item {
  padding: 16px 0 8px;
  border-bottom: 1px solid #1e1e1e;
}
.block-list-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #1a1a1a;
}
.block-list-item-name {
  font-size: 13px; color: #888; font-family: 'Noto Sans KR', sans-serif;
}
.block-list-item-dur {
  font-size: 11px; color: #444;
  font-family: 'DM Mono', monospace; letter-spacing: 1px;
}
.block-add-more {
  width: 100%; background: none; border: none;
  color: rgba(200,224,64,.6); font-size: 13px;
  font-family: 'DM Mono', monospace;
  padding: 14px 0 4px; cursor: pointer; letter-spacing: 1px;
  text-align: left; transition: color .2s;
}
.block-add-more:active { color: var(--accent); }
.block-del-confirm {
  display: none; width: 100%;
  background: none; border: none; border-top: 1px solid #1e1e1e;
  color: #555; font-size: 13px;
  font-family: 'DM Mono', monospace;
  padding: 16px; cursor: pointer; letter-spacing: 1px;
  transition: color .2s;
  margin-top: 12px;
}
.block-del-confirm:active { color: #e05555; }
.block-del-confirm.show { display: block; }
.order-row { display:flex; gap:8px; }
.obtn {
  flex:1; height:38px; border-radius:10px;
  border: 1px solid #2a2a2a; background: none;
  color: #555; font-size:11px; letter-spacing:1.5px;
  font-family:'DM Mono',monospace; cursor:pointer;
  transition: all .2s;
}
.obtn:active { opacity:.6; }
.obtn.active { border-color: rgba(200,224,64,.4); color: var(--accent); background: rgba(200,224,64,.05); }
.obtn.hidden { display:none; }
.start-row { display:flex; gap:8px; }
.sbtn {
  flex:1; height:48px; border-radius:12px;
  border:none; cursor:pointer;
  font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1.5px;
  transition: opacity .15s;
}
.sbtn:active { opacity:.7; }
.sbtn.pri { background:rgba(200,224,64,.07); border:1px solid rgba(200,224,64,.22); color:var(--accent); }
.sbtn.sec { background:none; border:1px solid #1e1e1e; color:#3a3a3a; }

/* RUN VIEW */
#runCanvas { position:absolute; inset:0; }
.rv-block {
  position:absolute; border:2px solid #090909; overflow:hidden;
}
.rv-bg { position:absolute; inset:0; }
.rv-fill { display: none; } /* shape animation으로 교체 */
.rv-content {
  position:absolute; inset:0; z-index:3;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:8px; gap:4px; pointer-events:none;
}
.rv-name {
  font-size:13px; font-weight:300; color:rgba(255,255,255,.12);
  text-align:center; line-height:1.3; transition:color .4s;
}
.rv-block.active .rv-name { color:rgba(255,255,255,.88); }
.rv-block.done  .rv-name  { color:rgba(255,255,255,.04); }
.rv-cd {
  font-family:'DM Mono',monospace; font-size:13px;
  color:transparent; letter-spacing:2px; transition:color .4s;
}
.rv-block.active .rv-cd { color:var(--accent); }
.rv-dur {
  font-family:'DM Mono',monospace; font-size:10px;
  color:rgba(200,224,64,.15); letter-spacing:1px;
}
.rv-block.active .rv-dur { display:none; }
.rv-block.done   .rv-dur { color:rgba(255,255,255,.03); }
.rv-check { font-size:11px; color:rgba(255,255,255,.06); display:none; }
.rv-shape {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 1;
  overflow: hidden;
}
.rv-shape canvas { display: block; }
.rv-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 80px;
  font-weight: 300;
  color: rgba(255,255,255,.05);
  pointer-events: none;
  z-index: 2;
  line-height: 1;
  transition: color .4s;
}
.rv-block.active .rv-num { color: rgba(200,224,64,.1); }
.rv-block.done   .rv-num { color: rgba(255,255,255,.02); }
.rv-block.done .rv-check { display:block; }

.rv-top {
  position:absolute; top:0; left:0; right:0;
  padding:20px 20px 0;
  z-index:20;
  display:flex; align-items:center; justify-content:space-between;
}
.rv-logo { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:5px; color:rgba(255,255,255,.08); }
.rv-stop {
  background:none; border:1px solid #222;
  border-radius:8px; padding:5px 14px;
  color:#444; font-size:11px;
  font-family:'DM Mono',monospace; cursor:pointer;
}
.rv-stop:active { color:#888; }

/* MODAL */
.modal-bg {
  position:fixed; inset:0; background:rgba(0,0,0,.8);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:100; opacity:0; pointer-events:none;
  transition:opacity .25s;
}
.modal-bg.open { opacity:1; pointer-events:all; }
.modal {
  background:#161616; width:100%; max-width:480px;
  border-radius:20px 20px 0 0; padding:0 0 36px;
  transform:translateY(40px); transition:transform .25s;
}
.modal-bg.open .modal { transform:translateY(0); }
.modal-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px; border-bottom:1px solid #1e1e1e;
}
.modal-hdr span { font-size:11px; color:#666; letter-spacing:2px; font-family:'DM Mono',monospace; }
.mb { background:none; border:none; cursor:pointer; font-family:'DM Mono',monospace; font-size:13px; }
.mb.c { color:#444; } .mb.ok { color:var(--accent); }
.pick-row { display:flex; align-items:center; justify-content:center; padding:8px 0; }
.pick-row select {
  background:none; border:none; color:#ddd;
  font-size:28px; font-weight:200;
  font-family:'DM Mono',monospace;
  text-align:center; width:80px;
  -webkit-appearance:none; cursor:pointer;
}
.pick-row select option { background:#1a1a1a; }
.plbl { color:#3a3a3a; font-size:14px; padding:0 4px; }
</style>
</head>
<body>
<div id="setupView">
  <div class="sv-header">
    <div class="sv-logo">TIMEBLOCK</div>
    <button class="sv-total-btn" id="totalBtn">총 1시간</button>
    <div class="sv-remain-wrap">
      <div class="sv-remain-label">남은</div>
      <div class="sv-remain-time" id="remainTime">60분</div>
    </div>
  </div>
  <div id="hint">블록을 탭해서 실행 순서를 정하세요</div>
  <div id="treemapPreview"></div>
  <div class="sv-bottom">
    <div class="add-row">
      <button class="del-btn" id="delBtn" title="선택 블록 삭제">✕</button>
      <button class="plus-btn" id="addBtn">+</button>
    </div>
    <div class="order-row">
      <button class="obtn" id="orderBtn">순서 정하기</button>
      <button class="obtn done hidden" id="orderDoneBtn">완료</button>
    </div>
    <div class="start-row">
      <button class="sbtn pri" id="startNow">지금 바로 시작</button>
      <button class="sbtn sec" id="startLater">시간 맞춰 시작</button>
    </div>
  </div>
</div>

<div id="runView">
  <div id="runCanvas"></div>
  <div class="rv-top">
    <div class="rv-logo">TIMEBLOCK</div>
    <button class="rv-stop" id="stopBtn">■ 중지</button>
  </div>
</div>

<!-- 총 시간 -->
<div class="modal-bg" id="totalModal">
  <div class="modal">
    <div class="modal-hdr">
      <button class="mb c" id="totalCancel">취소</button>
      <span>총 시간</span>
      <button class="mb ok" id="totalConfirm">확인</button>
    </div>
    <div class="pick-row">
      <select id="pH"></select><span class="plbl">시간</span>
      <select id="pM"></select><span class="plbl">분</span>
    </div>
  </div>
</div>

<!-- 블록 시간 -->
<div class="modal-bg" id="durModal">
  <div class="modal">
    <div class="modal-hdr">
      <button class="mb c" id="durCancel">취소</button>
      <span>블록 시간</span>
      <button class="mb ok" id="durConfirm">확인</button>
    </div>
    <div class="pick-row">
      <select id="dH"></select><span class="plbl">시간</span>
      <select id="dM"></select><span class="plbl">분</span>
    </div>
  </div>
</div>

<!-- 시간 맞춰 시작 -->
<div class="modal-bg" id="schedModal">
  <div class="modal">
    <div class="modal-hdr">
      <button class="mb c" id="schedCancel">취소</button>
      <span>시작 시간</span>
      <button class="mb ok" id="schedConfirm">확인</button>
    </div>
    <div class="pick-row">
      <select id="sH"></select><span class="plbl">시</span>
      <select id="sM"></select><span class="plbl">분</span>
    </div>
  </div>
</div>

<!-- 블록 추가/편집 팝업 -->
<div class="modal-bg" id="blockModal">
  <div class="modal block-modal">
    <div class="modal-hdr">
      <button class="mb c" id="blockCancel">취소</button>
      <span id="blockModalTitle">블록 추가</span>
      <button class="mb ok" id="blockConfirm">확인</button>
    </div>
    <div class="block-modal-body">
      <!-- 블록 목록 -->
      <div id="blockList"></div>
      <!-- 현재 편집 중인 블록 -->
      <div class="block-edit-item current-edit">
        <input class="block-name-input" id="blockNameInput" placeholder="목표 제목" maxlength="20">
        <div class="block-dur-row">
          <span class="block-dur-label">시간</span>
          <div class="block-dur-pickers">
            <select id="blockH"></select>
            <span class="plbl">시간</span>
            <select id="blockM"></select>
            <span class="plbl">분</span>
          </div>
        </div>
      </div>
      <button class="block-add-more" id="blockAddMore">+ 블록 추가</button>
    </div>
    <button class="block-del-confirm" id="blockDelete">이 블록 삭제</button>
  </div>
</div>

<script>
// ── 상태 ──
let totalSec = 3600;
let blocks = [];
let nid = 1, selId = null;
let order = [];
let orderMode = false;
let running = false, startTime = 0, curIdx = 0, raf = null;

const PALETTE = [
  '#0e1a04','#04120e','#100408','#040c18','#101004',
  '#08041c','#0e0a04','#040e14','#0c0410','#041010',
];
let pIdx = blocks.length;

// ── 픽커 ──
function fillSel(el, arr) {
  el.innerHTML = '';
  arr.forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`);
}
fillSel(document.getElementById('pH'), [...Array(24).keys()]);
fillSel(document.getElementById('pM'), [0,5,10,15,20,25,30,35,40,45,50,55]);
document.getElementById('pH').value = 1;
document.getElementById('pM').value = 0;
fillSel(document.getElementById('dH'), [...Array(24).keys()]);
fillSel(document.getElementById('dM'), [...Array(60).keys()]);
fillSel(document.getElementById('sH'), [...Array(24).keys()].map(h=>String(h).padStart(2,'0')));
fillSel(document.getElementById('blockH'), [...Array(24).keys()]);
fillSel(document.getElementById('blockM'), [...Array(60).keys()]);
document.getElementById('blockH').addEventListener('change', updateMinOptions);
fillSel(document.getElementById('sM'), [...Array(60).keys()].map(m=>String(m).padStart(2,'0')));
const _n = new Date();
document.getElementById('sH').value = String(_n.getHours()).padStart(2,'0');
document.getElementById('sM').value = String(_n.getMinutes()).padStart(2,'0');

// ── 포맷 ──
function fmtMin(s) {
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
  if(h>0&&m===0) return `${h}시간`;
  if(h>0) return `${h}시간 ${m}분`;
  return `${m}분`;
}
function fmtCD(s) {
  s = Math.max(0, Math.ceil(s));
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ── 트리맵 레이아웃 ──
function layout(items, x, y, w, h) {
  if(!items.length) return [];
  if(items.length===1) return [{item:items[0],x,y,w,h}];
  const rects = [];
  function split(its, rx, ry, rw, rh) {
    if(!its.length) return;
    if(its.length===1){ rects.push({item:its[0],x:rx,y:ry,w:rw,h:rh}); return; }
    const t = its.reduce((s,b)=>s+b.sec,0);
    const mid = Math.ceil(its.length/2);
    const L = its.slice(0,mid), R = its.slice(mid);
    const lf = L.reduce((s,b)=>s+b.sec,0)/t;
    if(rw >= rh) {
      split(L, rx, ry, rw*lf, rh);
      split(R, rx+rw*lf, ry, rw*(1-lf), rh);
    } else {
      split(L, rx, ry, rw, rh*lf);
      split(R, rx, ry+rh*lf, rw, rh*(1-lf));
    }
  }
  split(items, x, y, w, h);
  return rects;
}

// ── Setup 렌더 ──
function renderSetup() {
  const el = document.getElementById('treemapPreview');
  const W = el.clientWidth, H = el.clientHeight;
  el.innerHTML = '';
  if(!blocks.length) return;
  const rects = layout(blocks, 0, 0, W, H);
  rects.forEach(({item,x,y,w,h}) => {
    const d = document.createElement('div');
    d.className = 'tm-block' + (order.indexOf(item.id)!==-1?' ordered':'');
    d.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px`;
    const inner = document.createElement('div');
    inner.className = 'tm-inner';
    // 순서 뱃지
    const oi = order.indexOf(item.id);
    if(oi !== -1) {
      const badge = document.createElement('div');
      badge.className = 'tm-badge';
      badge.textContent = oi + 1;
      d.appendChild(badge);
    }
    const nm = document.createElement('div');
    nm.className = 'tm-name' + (item.name?'':' ph');
    nm.textContent = item.name || '제목';
    inner.appendChild(nm);
    if(w>55 && h>44) {
      const dt = document.createElement('div');
      dt.className = 'tm-dur';
      dt.textContent = fmtMin(item.sec);
      inner.appendChild(dt);
    }
    d.appendChild(inner);

    d.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if(orderMode) {
        // 순서 모드: 탭으로 번호 지정/해제
        const oi = order.indexOf(item.id);
        if(oi !== -1) order.splice(oi, 1);
        else order.push(item.id);
      } else {
        // 편집 모드: 탭으로 팝업 열기
        openBlockModal(item.id);
        return;
      }
      updatePanel(); renderSetup();
    });
    el.appendChild(d);
  });
  document.getElementById('totalBtn').textContent = `총 ${fmtMin(totalSec)}`;
  updateRemain();
  updatePanel();
}

function updatePanel() {
  const hint = document.getElementById('hint');
  if(orderMode) {
    hint.textContent = order.length > 0 ? `${order.length}개 순서 지정됨` : '블록을 탭해서 순서를 지정하세요';
    hint.classList.add('sel');
  } else {
    hint.textContent = blocks.length ? '블록을 탭해서 편집 · 순서 정하기로 순서 지정' : '+ 를 눌러 블록을 추가하세요';
    hint.classList.remove('sel');
  }
}

// ── Run 렌더 ──
function renderRun() {
  const canvas = document.getElementById('runCanvas');
  const W = canvas.clientWidth, H = canvas.clientHeight;
  canvas.innerHTML = '';
  const rects = layout(blocks, 0, 0, W, H);
  rects.forEach(({item,x,y,w,h},i) => {
    const d = document.createElement('div');
    d.className = 'rv-block';
    d.id = `rv${item.id}`;
    d.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px`;

    const bg = document.createElement('div');
    bg.className = 'rv-bg';
    bg.style.background = item.color || '#141414';
    d.appendChild(bg);

    // shape canvas
    const shapeWrap = document.createElement('div');
    shapeWrap.className = 'rv-shape';
    shapeWrap.id = `rvs${item.id}`;
    const cvs = document.createElement('canvas');
    cvs.width = Math.round(w); cvs.height = Math.round(h);
    cvs.style.width = w + 'px'; cvs.style.height = h + 'px';
    shapeWrap.appendChild(cvs);
    d.appendChild(shapeWrap);

    const cont = document.createElement('div');
    cont.className = 'rv-content';
    // 순서 번호 (배경에 크게)
    const oi = order.indexOf(item.id);
    if(oi !== -1) {
      const num = document.createElement('div');
      num.className = 'rv-num';
      num.textContent = oi + 1;
      // 블록 크기의 50% 정도 크기로
      num.style.fontSize = Math.min(w, h) * 0.55 + 'px';
      d.appendChild(num);
    }
    const nm = document.createElement('div'); nm.className='rv-name'; nm.textContent=item.name||'';
    const cd = document.createElement('div'); cd.className='rv-cd'; cd.id=`rvcd${item.id}`;
    const dur= document.createElement('div'); dur.className='rv-dur'; dur.textContent=fmtMin(item.sec);
    const chk= document.createElement('div'); chk.className='rv-check'; chk.textContent='✓';
    cont.appendChild(nm);
    if(h>60) cont.appendChild(cd);
    cont.appendChild(dur);
    cont.appendChild(chk);
    d.appendChild(cont);
    canvas.appendChild(d);
  });
  applyRunState();
}

function applyRunState() {
  blocks.forEach((b,i) => {
    const d = document.getElementById(`rv${b.id}`);
    if(!d) return;
    d.classList.toggle('done',   i < curIdx);
    d.classList.toggle('active', i === curIdx);
  });
}

// ── 타이머 ──
// 도형 타입 배열 (블록별 랜덤 배정)
const SHAPES = ['star5','circle','triangle','pentagon','hexagon'];
let blockShapes = {};
let shapeAngles = {}; // 현재 회전각

function updateRemain() {
  const used = blocks.reduce((s, b) => s + b.sec, 0);
  const remain = totalSec - used;
  const el = document.getElementById('remainTime');
  if(!el) return;
  if(remain < 0) {
    el.textContent = `-${fmtMin(Math.abs(remain))}`;
    el.classList.add('over');
  } else {
    el.textContent = fmtMin(remain);
    el.classList.remove('over');
  }
}

function assignShapes() {
  blocks.forEach(b => {
    if(!blockShapes[b.id]) {
      blockShapes[b.id] = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      shapeAngles[b.id] = Math.random() * Math.PI * 2;
    }
  });
}

function drawPolygon(ctx, cx, cy, r, sides, angle) {
  ctx.beginPath();
  for(let i = 0; i < sides; i++) {
    const a = angle + (i / sides) * Math.PI * 2;
    const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function drawStar(ctx, cx, cy, r, points, angle) {
  const inner = r * 0.42;
  ctx.beginPath();
  for(let i = 0; i < points * 2; i++) {
    const a = angle + (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
    const radius = i % 2 === 0 ? r : inner;
    const x = cx + radius * Math.cos(a), y = cy + radius * Math.sin(a);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function drawShapes() {
  blocks.forEach((b, i) => {
    const wrap = document.getElementById(`rvs${b.id}`);
    if(!wrap) return;
    const cvs = wrap.querySelector('canvas');
    if(!cvs) return;
    const ctx = cvs.getContext('2d');
    const W = cvs.width, H = cvs.height;
    ctx.clearRect(0, 0, W, H);

    const isDone   = i < curIdx;
    const isActive = i === curIdx;
    const pct = (window._shapePct && window._shapePct[b.id]) || 0;
    const shape = blockShapes[b.id] || 'rect';

    const rotSpeed = isActive ? 0.004 : 0.0007;
    shapeAngles[b.id] = (shapeAngles[b.id] || 0) + rotSpeed;
    const angle = shapeAngles[b.id];

    const cx = W / 2, cy = H / 2;
    const maxR = Math.sqrt(W*W + H*H) * 0.75;  // 블록 대각선보다 크게 — 화면 밖 출발
    const r = maxR * (1 - pct * 0.92);
    if(r < 2) return;

    // 도형 경로 함수
    function shapePath() {
      ctx.beginPath();
      switch(shape) {
        case 'rect':
          ctx.rect(-r, -r, r*2, r*2); break;
        case 'circle':
          ctx.arc(0, 0, r, 0, Math.PI*2); break;
        case 'triangle':
          for(let k=0;k<3;k++){
            const a=(k/3)*Math.PI*2-Math.PI/2;
            k===0?ctx.moveTo(r*Math.cos(a),r*Math.sin(a)):ctx.lineTo(r*Math.cos(a),r*Math.sin(a));
          }
          ctx.closePath(); break;
        case 'pentagon':
          for(let k=0;k<5;k++){
            const a=(k/5)*Math.PI*2-Math.PI/2;
            k===0?ctx.moveTo(r*Math.cos(a),r*Math.sin(a)):ctx.lineTo(r*Math.cos(a),r*Math.sin(a));
          }
          ctx.closePath(); break;
        case 'hexagon':
          for(let k=0;k<6;k++){
            const a=(k/6)*Math.PI*2;
            k===0?ctx.moveTo(r*Math.cos(a),r*Math.sin(a)):ctx.lineTo(r*Math.cos(a),r*Math.sin(a));
          }
          ctx.closePath(); break;
        case 'star5': {
          const inn=r*0.42;
          for(let k=0;k<10;k++){
            const a=(k/10)*Math.PI*2-Math.PI/2;
            const rad=k%2===0?r:inn;
            k===0?ctx.moveTo(rad*Math.cos(a),rad*Math.sin(a)):ctx.lineTo(rad*Math.cos(a),rad*Math.sin(a));
          }
          ctx.closePath(); break;
        }
      }
    }

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);

    if(isDone) {
      // 완료: 아무것도 안 그림 (회전 정지)
      ctx.restore();
      return;
    } else if(isActive) {
      // 채도 고정 — pct와 무관하게 일정하게 유지
      const brightness = 0.60;

      // 1) 배경 전체를 밝게 — 회전 없이 고정
      ctx.save();
      ctx.setTransform(1,0,0,1,0,0);
      ctx.fillStyle = `rgba(200,224,64,${brightness})`;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();

      // 2) 도형 안쪽만 어둡게 — 테두리 없음
      shapePath();
      ctx.fillStyle = 'rgba(10,10,10,0.92)';
      ctx.fill();

    } else {
      // 대기 중: 아무것도 안 그림
    }

    ctx.restore();
  });
}

// 대기/완료 블록도 애니메이션 — 별도 루프
let idleRaf = null;
function idleLoop() {
  if(running) { idleRaf = null; return; } // tick이 담당
  drawShapes();
  idleRaf = requestAnimationFrame(idleLoop);
}

function startTimer(st) {
  // 순서 지정된 블록만, 순서대로 실행. 미지정이면 원래 순서 전체
  if(order.length > 0) {
    const ordered = order.map(id => blocks.find(b=>b.id===id)).filter(Boolean);
    // 순서 미지정 블록은 뒤에 추가
    const rest = blocks.filter(b => order.indexOf(b.id)===-1);
    blocks = [...ordered, ...rest];
  }
  assignShapes();
  if(idleRaf) cancelAnimationFrame(idleRaf);
  window._shapePct = {};
  running = true; startTime = st; curIdx = 0;
  document.getElementById('setupView').classList.add('hidden');
  document.getElementById('runView').classList.add('active');
  renderRun(); assignShapes(); window._shapePct={}; tick();
}
function stopTimer() {
  running = false;
  if(raf) cancelAnimationFrame(raf);
  document.getElementById('runView').classList.remove('active');
  document.getElementById('setupView').classList.remove('hidden');
  renderSetup();
  blockShapes = {};
}
function tick() {
  if(!running) return;
  const now = Date.now();
  if(now < startTime){ raf=requestAnimationFrame(tick); return; }
  if(curIdx >= blocks.length){ stopTimer(); return; }
  let cur = startTime;
  for(let i=0;i<curIdx;i++) cur += blocks[i].sec*1000;
  const dur = blocks[curIdx].sec*1000;
  const pct = Math.min(1, Math.max(0,(now-cur)/dur));
  const rem = (cur+dur-now)/1000;
  // shape는 RAF 루프에서 직접 그림 — 여기선 pct만 저장
  window._shapePct = window._shapePct || {};
  window._shapePct[blocks[curIdx].id] = pct;
  const ce = document.getElementById(`rvcd${blocks[curIdx].id}`);
  if(ce) ce.textContent = fmtCD(rem);
  if(pct>=1){ curIdx++; applyRunState(); }
  drawShapes();
  raf = requestAnimationFrame(tick);
}

// ── 이벤트 ──
let editingId = null; // null=새 블록, id=기존 블록 편집

function openBlockModal(id) {
  editingId = id;
  const isNew = id === null;
  document.getElementById('blockModalTitle').textContent = isNew ? '블록 추가' : '블록 편집';
  const b = isNew ? {name:'', sec:600} : blocks.find(b=>b.id===id);
  document.getElementById('blockNameInput').value = b.name;
  // 먼저 피커 범위 업데이트 후 현재값 세팅
  updateDurPickers();
  const bH = Math.floor(b.sec/3600);
  const bM = Math.floor((b.sec%3600)/60);
  const hSel = document.getElementById('blockH');
  const mSel = document.getElementById('blockM');
  if([...hSel.options].some(o=>parseInt(o.value)===bH)) hSel.value = bH;
  updateMinOptions();
  if([...mSel.options].some(o=>parseInt(o.value)===bM)) mSel.value = bM;
  const delBtn = document.getElementById('blockDelete');
  if(isNew) delBtn.classList.remove('show');
  else delBtn.classList.add('show');
  renderBlockList();
  document.getElementById('blockModal').classList.add('open');
  setTimeout(()=>document.getElementById('blockNameInput').focus(), 300);
}

document.getElementById('addBtn').onclick = () => openBlockModal(null);

document.getElementById('blockCancel').onclick = () => {
  document.getElementById('blockModal').classList.remove('open');
};

function getRemainSec() {
  // 현재 editingId 블록 제외하고 나머지 블록들의 합산
  const usedSec = blocks.reduce((s, b) => {
    if(editingId !== null && b.id === editingId) return s; // 편집 중인 블록 제외
    return s + b.sec;
  }, 0);
  return Math.max(60, totalSec - usedSec);
}

function updateDurPickers() {
  const remain = getRemainSec();
  const maxH = Math.floor(remain / 3600);
  const curH = parseInt(document.getElementById('blockH').value) || 0;

  // 시간 옵션 업데이트
  const hSel = document.getElementById('blockH');
  const prevH = parseInt(hSel.value) || 0;
  hSel.innerHTML = '';
  for(let h = 0; h <= maxH; h++) {
    hSel.innerHTML += `<option value="${h}">${h}</option>`;
  }
  hSel.value = Math.min(prevH, maxH);

  // 분 옵션 업데이트 — 선택된 시간에 따라 남은 분 계산
  updateMinOptions();
}

function updateMinOptions() {
  const remain = getRemainSec();
  const curH = parseInt(document.getElementById('blockH').value) || 0;
  const maxRemainAfterH = remain - curH * 3600;
  const maxM = Math.min(59, Math.floor(maxRemainAfterH / 60));

  const mSel = document.getElementById('blockM');
  const prevM = parseInt(mSel.value) || 0;
  mSel.innerHTML = '';
  // 최소 1분
  const minM = curH === 0 ? 1 : 0;
  for(let m = minM; m <= maxM; m++) {
    mSel.innerHTML += `<option value="${m}">${m}</option>`;
  }
  mSel.value = Math.min(prevM, maxM);
}

function saveCurrentEdit() {
  const name = document.getElementById('blockNameInput').value.trim();
  const sec = parseInt(document.getElementById('blockH').value)*3600
            + parseInt(document.getElementById('blockM').value)*60;
  const finalSec = Math.max(60, sec);
  if(editingId === null) {
    blocks.push({id:nid++, name, sec:finalSec, color:PALETTE[pIdx++%PALETTE.length]});
  } else {
    const b = blocks.find(b=>b.id===editingId);
    if(b) { b.name = name; b.sec = finalSec; }
  }
  selId = null;
}

function renderBlockList() {
  const list = document.getElementById('blockList');
  list.innerHTML = '';
  blocks.forEach(b => {
    const row = document.createElement('div');
    row.className = 'block-list-item';
    row.innerHTML = `<span class="block-list-item-name">${b.name||'이름없음'}</span>
                     <span class="block-list-item-dur">${fmtMin(b.sec)}</span>`;
    list.appendChild(row);
  });
}

document.getElementById('blockConfirm').onclick = () => {
  saveCurrentEdit();
  document.getElementById('blockModal').classList.remove('open');
  renderSetup();
};

document.getElementById('blockAddMore').onclick = () => {
  // 현재 입력 저장하고 새 블록 입력 준비
  saveCurrentEdit();
  editingId = null;
  document.getElementById('blockNameInput').value = '';
  updateDurPickers();
  document.getElementById('blockH').value = 0;
  updateMinOptions();
  document.getElementById('blockDelete').classList.remove('show');
  document.getElementById('blockModalTitle').textContent = '블록 추가';
  renderBlockList();
  renderSetup();
  document.getElementById('blockNameInput').focus();
};

document.getElementById('blockDelete').onclick = () => {
  if(editingId && blocks.length > 1) {
    order = order.filter(id=>id!==editingId);
    blocks = blocks.filter(b=>b.id!==editingId);
    selId = null;
  }
  document.getElementById('blockModal').classList.remove('open');
  renderSetup();
};
document.getElementById('delBtn').onclick = () => {
  if(!selId) return;
  openBlockModal(selId);
};
// 편집은 blockModal에서 처리
document.getElementById('totalBtn').onclick=()=>document.getElementById('totalModal').classList.add('open');
document.getElementById('totalCancel').onclick=()=>document.getElementById('totalModal').classList.remove('open');
document.getElementById('totalConfirm').onclick=()=>{
  totalSec=Math.max(60,parseInt(document.getElementById('pH').value)*3600+parseInt(document.getElementById('pM').value)*60);
  document.getElementById('totalModal').classList.remove('open');
  updateDurPickers();
  renderSetup();
};
document.getElementById('startNow').onclick=()=>{ if(blocks.length) startTimer(Date.now()); };
document.getElementById('startLater').onclick=()=>document.getElementById('schedModal').classList.add('open');
document.getElementById('schedCancel').onclick=()=>document.getElementById('schedModal').classList.remove('open');
document.getElementById('schedConfirm').onclick=()=>{
  const h=parseInt(document.getElementById('sH').value), m=parseInt(document.getElementById('sM').value);
  const now=new Date(), t=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,0,0);
  if(t<now) t.setDate(t.getDate()+1);
  document.getElementById('schedModal').classList.remove('open');
  startTimer(t.getTime());
};
document.getElementById('stopBtn').onclick=stopTimer;

document.getElementById('orderBtn').onclick = () => {
  orderMode = true;
  order = [];
  selId = null;
  document.getElementById('orderBtn').classList.add('active', 'hidden');
  document.getElementById('orderDoneBtn').classList.remove('hidden');
  updatePanel(); renderSetup();
};
document.getElementById('orderDoneBtn').onclick = () => {
  orderMode = false;
  document.getElementById('orderBtn').classList.remove('active', 'hidden');
  document.getElementById('orderDoneBtn').classList.add('hidden');
  updatePanel(); renderSetup();
};
window.addEventListener('resize',()=>running?renderRun():renderSetup());
renderSetup();
</script>
